name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Iniciar preview e checar links internos
        run: |
          npm run preview &
          npx wait-on http://localhost:4321/Documents/ --timeout 60000
          npx linkinator http://localhost:4321/Documents/ --recurse --skip "^https?://(?!localhost)"

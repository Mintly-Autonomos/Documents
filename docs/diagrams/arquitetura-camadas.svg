<svg viewBox="0 0 940 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, system-ui, sans-serif" role="img" aria-label="Arquitetura em camadas da MintlyApi">
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .title { fill: #0f172a; font-weight: 700; font-size: 15px; }
    .sub { fill: #64748b; font-size: 11px; }
    .btxt { fill: #0f172a; font-size: 12.5px; font-weight: 600; }
    .bmut { fill: #64748b; font-size: 10.5px; }
    .flow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .arrowhead { fill: #94a3b8; }
    .ctxband { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1; stroke-dasharray: 5 4; }
    .ctxtxt { fill: #7c3aed; font-size: 11px; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0b1120; }
      .panel { fill: #111827; stroke: #1f2a3c; }
      .title { fill: #e5edf7; }
      .sub, .bmut { fill: #94a3b8; }
      .btxt { fill: #e5edf7; }
      .flow, .arrowhead { stroke: #64748b; fill: #64748b; }
      .arrowhead { fill: #64748b; }
      .ctxband { fill: #1e1b3a; stroke: #a78bfa; }
      .ctxtxt { fill: #a78bfa; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="arrowhead" d="M0,0 L10,5 L0,10 z"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="940" height="500"/>
  <text class="title" x="28" y="34">MintlyApi — arquitetura "Layered Simplified"</text>
  <text class="sub" x="28" y="52">Cada request percorre as camadas; o RequestContext é passado explicitamente da rota até o banco.</text>

  <!-- lanes -->
  <rect class="panel" x="28" y="90" width="150" height="86" rx="9" stroke="#6366f1"/>
  <circle cx="46" cy="110" r="4" fill="#6366f1"/>
  <text class="btxt" x="58" y="114">Routes</text>
  <text class="bmut" x="42" y="136">Fastify · schema de body</text>
  <text class="bmut" x="42" y="152">hooks: env allowlist,</text>
  <text class="bmut" x="42" y="166">verifyJwt (protegidas)</text>

  <rect class="panel" x="212" y="90" width="150" height="86" rx="9" stroke="#0ea5e9"/>
  <circle cx="230" cy="110" r="4" fill="#0ea5e9"/>
  <text class="btxt" x="242" y="114">Controllers</text>
  <text class="bmut" x="226" y="136">monta ctx · orm.parse</text>
  <text class="bmut" x="226" y="152">ResponseBuilder</text>
  <text class="bmut" x="226" y="166">(build / send)</text>

  <rect class="panel" x="396" y="90" width="150" height="86" rx="9" stroke="#10b981"/>
  <circle cx="414" cy="110" r="4" fill="#10b981"/>
  <text class="btxt" x="426" y="114">Use-cases</text>
  <text class="bmut" x="410" y="136">regra de negócio</text>
  <text class="bmut" x="410" y="152">CrudUseCase genérico</text>
  <text class="bmut" x="410" y="166">ou dedicado (transação)</text>

  <rect class="panel" x="580" y="90" width="150" height="86" rx="9" stroke="#f59e0b"/>
  <circle cx="598" cy="110" r="4" fill="#f59e0b"/>
  <text class="btxt" x="610" y="114">Repositories</text>
  <text class="bmut" x="594" y="136">MongodbCrudRepository</text>
  <text class="bmut" x="594" y="152">+ repos de domínio</text>
  <text class="bmut" x="594" y="166">withTenant / mappers</text>

  <rect class="panel" x="764" y="90" width="148" height="86" rx="9" stroke="#64748b"/>
  <ellipse cx="800" cy="110" rx="16" ry="5.5" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <path d="M784 110 v14 a16 5.5 0 0 0 32 0 v-14" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text class="btxt" x="826" y="114">MongoDB</text>
  <text class="bmut" x="778" y="140">Atlas · banco por env</text>
  <text class="bmut" x="778" y="156">Decimal128 · $inc</text>

  <!-- flow arrows -->
  <line class="flow" x1="178" y1="133" x2="210" y2="133"/>
  <line class="flow" x1="362" y1="133" x2="394" y2="133"/>
  <line class="flow" x1="546" y1="133" x2="578" y2="133"/>
  <line class="flow" x1="730" y1="133" x2="762" y2="133"/>

  <!-- examples panel -->
  <text class="title" x="28" y="212" font-size="13">Exemplos por domínio</text>
  <rect class="panel" x="28" y="226" width="884" height="120" rx="10"/>
  <rect x="28" y="226" width="5" height="120" rx="2" fill="#0ea5e9"/>

  <text class="btxt" x="48" y="252" font-size="12" fill="#0369a1">Auth</text>
  <text class="bmut" x="120" y="252">/auth/* → AuthController → AuthUseCase · RegisterUseCase · PasswordRecoveryUseCase</text>
  <text class="bmut" x="120" y="270">→ AuthRepository · PasswordResetRepository (+ valkyrie-jwt, email-service, audit)</text>

  <text class="btxt" x="48" y="298" font-size="12" fill="#047857">CRUD</text>
  <text class="bmut" x="120" y="298">/people · /financial-accounts · /financial-categories → CrudController → CrudUseCase → MongodbCrudRepository</text>
  <text class="bmut" x="120" y="316">Account/Category adicionam use-cases próprios (set-default, inactivate…) e sobrescrevem findAll/insert.</text>

  <text class="btxt" x="48" y="336" font-size="12" fill="#b45309">Movimento</text>
  <text class="bmut" x="120" y="336">/financial-movements → FinancialMovementController → Register/Update/ChangeStatus/Recompute (transacional)</text>

  <!-- RequestContext band -->
  <rect class="ctxband" x="28" y="366" width="884" height="112" rx="10"/>
  <text class="ctxtxt" x="44" y="390">RequestContext { env, userId?, restaurantId? } — atravessa todas as camadas</text>
  <text class="bmut" x="44" y="412">• env → seleciona o banco (getDatabase); validado contra a allowlist (app.valid_environments).</text>
  <text class="bmut" x="44" y="432">• userId / restaurantId → vêm do JWT validado (verifyJwt), nunca de header.</text>
  <text class="bmut" x="44" y="452">• withTenant(filter, ctx) injeta restaurantId em toda operação da base → isolamento multi-tenant.</text>
</svg>

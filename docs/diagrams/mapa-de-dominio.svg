<svg viewBox="0 0 960 672" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, system-ui, sans-serif" role="img" aria-label="Mapa de domínio: use-cases e collections da MintlyApi">
  <style>
    .bg { fill: #ffffff; }
    .card { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    .h1 { fill: #0f172a; font-weight: 800; font-size: 16px; }
    .sub { fill: #64748b; font-size: 11px; }
    .mod { font-weight: 700; font-size: 13px; }
    .route { fill: #64748b; font-size: 10.5px; font-family: ui-monospace, monospace; }
    .uc { fill: #0f172a; font-size: 11.5px; font-weight: 600; }
    .tag { fill: #eef2f7; }
    .tagtxt { fill: #475569; font-size: 9px; font-family: ui-monospace, monospace; }
    .txbadge { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1; }
    .txtxt { fill: #b45309; font-size: 8.5px; font-weight: 700; }
    .legend { fill: #64748b; font-size: 10.5px; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0b1120; }
      .card { fill: #111827; stroke: #1f2a3c; }
      .h1 { fill: #e5edf7; }
      .sub, .route, .legend { fill: #94a3b8; }
      .uc { fill: #e5edf7; }
      .tag { fill: #1e293b; }
      .tagtxt { fill: #cbd5e1; }
      .txbadge { fill: #3a2f10; stroke: #d97706; }
      .txtxt { fill: #fbbf24; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="960" height="672"/>
  <text class="h1" x="28" y="36">Mapa de domínio — use-cases → collections</text>
  <text class="sub" x="28" y="55">Quais use-cases tocam quais collections. ⚡ = roda em transação Mongo (multi-documento, atômico).</text>

  <!-- ============ AUTH (large, full width) ============ -->
  <rect class="card" x="28" y="74" width="904" height="196" rx="12"/>
  <rect x="28" y="74" width="6" height="196" rx="3" fill="#6366f1"/>
  <text class="mod" x="48" y="100" fill="#4f46e5">Auth</text>
  <text class="route" x="90" y="100">/auth</text>

  <!-- auth use-cases as rows -->
  <!-- Register -->
  <text class="uc" x="48" y="128">RegisterUseCase (signup)</text>
  <rect class="txbadge" x="232" y="118" width="26" height="14" rx="7"/><text class="txtxt" x="238" y="128">⚡ tx</text>
  <g transform="translate(280,116)">
    <rect class="tag" x="0" y="0" width="40" height="15" rx="7"/><text class="tagtxt" x="7" y="11">users</text>
    <rect class="tag" x="46" y="0" width="46" height="15" rx="7"/><text class="tagtxt" x="53" y="11">people</text>
    <rect class="tag" x="98" y="0" width="72" height="15" rx="7"/><text class="tagtxt" x="105" y="11">restaurants</text>
    <rect class="tag" x="176" y="0" width="112" height="15" rx="7"/><text class="tagtxt" x="183" y="11">financial_accounts</text>
    <rect class="tag" x="294" y="0" width="118" height="15" rx="7"/><text class="tagtxt" x="301" y="11">financial_categories</text>
    <rect class="tag" x="418" y="0" width="70" height="15" rx="7"/><text class="tagtxt" x="425" y="11">audit_logs</text>
    <rect class="tag" x="494" y="0" width="46" height="15" rx="7"/><text class="tagtxt" x="501" y="11">+ jwt</text>
  </g>

  <text class="uc" x="48" y="156">AuthUseCase.login</text>
  <g transform="translate(280,144)">
    <rect class="tag" x="0" y="0" width="40" height="15" rx="7"/><text class="tagtxt" x="7" y="11">users</text>
    <rect class="tag" x="46" y="0" width="70" height="15" rx="7"/><text class="tagtxt" x="53" y="11">audit_logs</text>
    <rect class="tag" x="122" y="0" width="46" height="15" rx="7"/><text class="tagtxt" x="129" y="11">+ jwt</text>
  </g>

  <text class="uc" x="48" y="184">AuthUseCase.refresh / logout</text>
  <g transform="translate(280,172)">
    <rect class="tag" x="0" y="0" width="40" height="15" rx="7"/><text class="tagtxt" x="7" y="11">users</text>
    <rect class="tag" x="46" y="0" width="70" height="15" rx="7"/><text class="tagtxt" x="53" y="11">audit_logs</text>
    <rect class="tag" x="122" y="0" width="46" height="15" rx="7"/><text class="tagtxt" x="129" y="11">+ jwt</text>
  </g>

  <text class="uc" x="48" y="212">PasswordRecovery.request</text>
  <g transform="translate(280,200)">
    <rect class="tag" x="0" y="0" width="40" height="15" rx="7"/><text class="tagtxt" x="7" y="11">users</text>
    <rect class="tag" x="46" y="0" width="132" height="15" rx="7"/><text class="tagtxt" x="53" y="11">password_reset_tokens</text>
    <rect class="tag" x="184" y="0" width="70" height="15" rx="7"/><text class="tagtxt" x="191" y="11">audit_logs</text>
    <rect class="tag" x="260" y="0" width="58" height="15" rx="7"/><text class="tagtxt" x="267" y="11">+ email</text>
  </g>

  <text class="uc" x="48" y="240">PasswordRecovery.reset</text>
  <g transform="translate(280,228)">
    <rect class="tag" x="0" y="0" width="40" height="15" rx="7"/><text class="tagtxt" x="7" y="11">users</text>
    <rect class="tag" x="46" y="0" width="132" height="15" rx="7"/><text class="tagtxt" x="53" y="11">password_reset_tokens</text>
    <rect class="tag" x="184" y="0" width="70" height="15" rx="7"/><text class="tagtxt" x="191" y="11">audit_logs</text>
    <rect class="tag" x="260" y="0" width="46" height="15" rx="7"/><text class="tagtxt" x="267" y="11">+ jwt</text>
  </g>

  <!-- ============ PERSON ============ -->
  <rect class="card" x="28" y="286" width="290" height="120" rx="12"/>
  <rect x="28" y="286" width="6" height="120" rx="3" fill="#0ea5e9"/>
  <text class="mod" x="48" y="312" fill="#0369a1">Person</text>
  <text class="route" x="104" y="312">/people</text>
  <text class="uc" x="48" y="340">CRUD genérico</text>
  <text class="sub" x="48" y="358">insert · findById · find · findAll · update · delete</text>
  <g transform="translate(48,368)">
    <rect class="tag" x="0" y="0" width="46" height="15" rx="7"/><text class="tagtxt" x="7" y="11">people</text>
  </g>
  <text class="sub" x="48" y="398">via CrudController → CrudUseCase → base</text>

  <!-- ============ ACCOUNT ============ -->
  <rect class="card" x="335" y="286" width="290" height="120" rx="12"/>
  <rect x="335" y="286" width="6" height="120" rx="3" fill="#f59e0b"/>
  <text class="mod" x="355" y="312" fill="#b45309">Account</text>
  <text class="route" x="420" y="312">/financial-accounts</text>
  <text class="uc" x="355" y="338">CRUD · SetDefault ⚡ · Inactivate ⚡</text>
  <g transform="translate(355,350)">
    <rect class="tag" x="0" y="0" width="112" height="15" rx="7"/><text class="tagtxt" x="7" y="11">financial_accounts</text>
  </g>
  <text class="sub" x="355" y="384">insert força saldo=0 / isDefault=false;</text>
  <text class="sub" x="355" y="398">SetDefault troca o padrão em transação.</text>

  <!-- ============ CATEGORY ============ -->
  <rect class="card" x="642" y="286" width="290" height="120" rx="12"/>
  <rect x="642" y="286" width="6" height="120" rx="3" fill="#10b981"/>
  <text class="mod" x="662" y="312" fill="#047857">Category</text>
  <text class="route" x="730" y="312">/financial-categories</text>
  <text class="uc" x="662" y="338">CRUD · Inactivate/Reactivate · Suggest</text>
  <g transform="translate(662,350)">
    <rect class="tag" x="0" y="0" width="118" height="15" rx="7"/><text class="tagtxt" x="7" y="11">financial_categories</text>
  </g>
  <text class="sub" x="662" y="384">status muda só via inactivate/reactivate</text>
  <text class="sub" x="662" y="398">(auditado no history[]); Suggest é read-only.</text>

  <!-- ============ MOVEMENT (full width) ============ -->
  <rect class="card" x="28" y="422" width="904" height="196" rx="12"/>
  <rect x="28" y="422" width="6" height="196" rx="3" fill="#ec4899"/>
  <text class="mod" x="48" y="448" fill="#be185d">Movement</text>
  <text class="route" x="128" y="448">/financial-movements</text>
  <text class="sub" x="300" y="448">Todos rodam em transação e ajustam o saldo da conta ($inc Decimal128) no mesmo commit.</text>

  <text class="uc" x="48" y="480">RegisterMovementUseCase</text>
  <rect class="txbadge" x="232" y="470" width="26" height="14" rx="7"/><text class="txtxt" x="238" y="480">⚡ tx</text>
  <g transform="translate(300,468)">
    <rect class="tag" x="0" y="0" width="126" height="15" rx="7"/><text class="tagtxt" x="7" y="11">financial_movements</text>
    <rect class="tag" x="132" y="0" width="112" height="15" rx="7"/><text class="tagtxt" x="139" y="11">financial_accounts</text>
    <rect class="tag" x="250" y="0" width="118" height="15" rx="7"/><text class="tagtxt" x="257" y="11">financial_categories</text>
  </g>

  <text class="uc" x="48" y="512">UpdateMovementUseCase</text>
  <rect class="txbadge" x="232" y="502" width="26" height="14" rx="7"/><text class="txtxt" x="238" y="512">⚡ tx</text>
  <g transform="translate(300,500)">
    <rect class="tag" x="0" y="0" width="126" height="15" rx="7"/><text class="tagtxt" x="7" y="11">financial_movements</text>
    <rect class="tag" x="132" y="0" width="112" height="15" rx="7"/><text class="tagtxt" x="139" y="11">financial_accounts</text>
    <rect class="tag" x="250" y="0" width="118" height="15" rx="7"/><text class="tagtxt" x="257" y="11">financial_categories</text>
  </g>

  <text class="uc" x="48" y="544">ChangeMovementStatusUseCase</text>
  <rect class="txbadge" x="232" y="534" width="26" height="14" rx="7"/><text class="txtxt" x="238" y="544">⚡ tx</text>
  <g transform="translate(300,532)">
    <rect class="tag" x="0" y="0" width="126" height="15" rx="7"/><text class="tagtxt" x="7" y="11">financial_movements</text>
    <rect class="tag" x="132" y="0" width="112" height="15" rx="7"/><text class="tagtxt" x="139" y="11">financial_accounts</text>
  </g>

  <text class="uc" x="48" y="576">RecomputeBalancesUseCase</text>
  <rect class="txbadge" x="232" y="566" width="26" height="14" rx="7"/><text class="txtxt" x="238" y="576">⚡ tx</text>
  <g transform="translate(300,564)">
    <rect class="tag" x="0" y="0" width="126" height="15" rx="7"/><text class="tagtxt" x="7" y="11">financial_movements</text>
    <rect class="tag" x="132" y="0" width="112" height="15" rx="7"/><text class="tagtxt" x="139" y="11">financial_accounts</text>
  </g>
  <text class="sub" x="48" y="602">Saldo em 2 buckets: settled → availableBalance · pending → predictedBalance · cancelled → sem impacto.</text>

  <!-- legend -->
  <text class="legend" x="28" y="648">Legenda:</text>
  <rect class="txbadge" x="88" y="638" width="26" height="14" rx="7"/><text class="txtxt" x="94" y="648">⚡ tx</text>
  <text class="legend" x="122" y="648">transação Mongo (atômica).</text>
  <rect class="tag" x="300" y="637" width="60" height="15" rx="7"/><text class="tagtxt" x="307" y="648">collection</text>
  <text class="legend" x="368" y="648">documento tocado.  “+ jwt / email” = serviço externo (valkyrie / e-mail).</text>
</svg>
